<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <script>
      (function () {
        var mode = localStorage.getItem('site-theme-mode') || 'system';
        var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = mode === 'system' ? (isDark ? 'dark' : 'light') : mode;
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        var favicon = document.getElementById('app-favicon');
        if (favicon) {
          favicon.href = theme === 'dark' ? '/favicon-dark.svg' : '/favicon.svg';
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Professional portfolio for Rowan Smith featuring experience, resume highlights, and selected projects."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Rowan Smith</title>
    <script>
      // Restore path saved by 404.html redirect (GitHub Pages SPA support)
      (function () {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
