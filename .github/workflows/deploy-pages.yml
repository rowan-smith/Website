name: Deploy Website To GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./website/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Determine Vite base path
        id: base
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          OVERRIDE_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          if [[ -f "./public/CNAME" ]]; then
            BASE="/"
            REASON="custom-domain-cname"
          elif [[ -n "$OVERRIDE_BASE_PATH" ]]; then
            BASE="$OVERRIDE_BASE_PATH"
            REASON="repo-variable-override"
          elif [[ "$REPO_NAME" == *.github.io ]]; then
            BASE="/"
            REASON="user-site-repo"
          else
            BASE="/$REPO_NAME/"
            REASON="project-site-repo"
          fi

          # Ensure BASE starts and ends with a slash for Vite.
          [[ "$BASE" != /* ]] && BASE="/$BASE"
          [[ "$BASE" != */ ]] && BASE="$BASE/"

          echo "Using Vite base path: $BASE ($REASON)"
          echo "path=$BASE" >> "$GITHUB_OUTPUT"

      - name: Build website
        run: npm run build -- --base "${{ steps.base.outputs.path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
